name: Android Build & Release

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Decode Keystore
      if: env.KEYSTORE_BASE64 != ''
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/release.jks
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Build Release APK
      run: ./gradlew assembleRelease
      env:
        KEYSTORE_FILE: ${{ secrets.KEYSTORE_BASE64 != '' && 'release.jks' || '' }}
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    - name: Compute Hashes
      run: |
        DEBUG_HASH=$(sha256sum app/build/outputs/apk/debug/app-debug.apk | awk '{ print $1 }')
        RELEASE_HASH=$(sha256sum app/build/outputs/apk/release/app-release.apk | awk '{ print $1 }')
        
        echo "DEBUG_HASH=$DEBUG_HASH" >> $GITHUB_ENV
        echo "RELEASE_HASH=$RELEASE_HASH" >> $GITHUB_ENV
        
        echo "### Verification Hashes" > release-notes.md
        echo "**Debug APK (SHA-256):** \`$DEBUG_HASH\`" >> release-notes.md
        echo "**Release APK (SHA-256):** \`$RELEASE_HASH\`" >> release-notes.md

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: piprapay-debug-app
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: piprapay-release-app
        path: app/build/outputs/apk/release/app-release.apk

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          app/build/outputs/apk/debug/app-debug.apk
          app/build/outputs/apk/release/app-release.apk
        body_path: release-notes.md
        generate_release_notes: true
