name: Android Build & Release

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Decode Keystore
      if: env.KEYSTORE_BASE64 != ''
      run: |
        $keystoreBytes = [System.Convert]::FromBase64String("${{ secrets.KEYSTORE_BASE64 }}")
        [System.IO.File]::WriteAllBytes("app/release.jks", $keystoreBytes)
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

    - name: Build Debug APK
      run: .\gradlew.bat assembleDebug

    - name: Build Release APK
      run: .\gradlew.bat assembleRelease
      env:
        KEYSTORE_FILE: ${{ secrets.KEYSTORE_BASE64 != '' && 'release.jks' || '' }}
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    - name: Compute Hashes
      run: |
        $debugHash = (Get-FileHash -Path "app\build\outputs\apk\debug\app-debug.apk" -Algorithm SHA256).Hash
        $releaseHash = (Get-FileHash -Path "app\build\outputs\apk\release\app-release.apk" -Algorithm SHA256).Hash
        "DEBUG_HASH=$debugHash" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        "RELEASE_HASH=$releaseHash" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        "### Verification Hashes" | Out-File -FilePath release-notes.md -Encoding utf8
        "**Debug APK (SHA-256):** $debugHash" | Out-File -FilePath release-notes.md -Encoding utf8 -Append
        "**Release APK (SHA-256):** $releaseHash" | Out-File -FilePath release-notes.md -Encoding utf8 -Append

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: piprapay-debug-app
        path: app\build\outputs\apk\debug\app-debug.apk

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: piprapay-release-app
        path: app\build\outputs\apk\release\app-release.apk

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          app/build/outputs/apk/debug/app-debug.apk
          app/build/outputs/apk/release/app-release.apk
        body_path: release-notes.md
        generate_release_notes: true
